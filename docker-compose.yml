services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: sepsis_db
    environment:
      POSTGRES_USER: sepsis_user
      POSTGRES_PASSWORD: sepsis_pass_dev
      POSTGRES_DB: sepsis_watch
    ports:
      - "5434:5432"   # mapped to 5434 on host to avoid conflict with local Postgres
    volumes:
      - timescale_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sepsis_user -d sepsis_watch"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sepsis_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery worker: processes on-demand + periodic scoring tasks ──────────
  celery_worker:
    build: .
    container_name: sepsis_celery_worker
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery beat: fires periodic tasks (every 15 min by default) ─────────
  celery_beat:
    build: .
    container_name: sepsis_celery_beat
    command: celery -A app.worker beat --loglevel=info
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescale_data:

# Render deployment config — render.yaml
# https://render.com/docs/blueprint-spec
#
# FREE TIER DEPLOYMENT (no credit card required):
#   Database : Supabase free tier  → https://supabase.com  (signup with GitHub)
#   Redis    : Upstash free tier   → https://upstash.com   (signup with GitHub)
#   Hosting  : Render free tier    → https://render.com    (signup with GitHub)
#
# Setup steps:
#   1. Create a Supabase project → Settings → Database → copy "Connection string (URI)"
#      Change postgres:// to postgresql+asyncpg:// for DATABASE_URL
#      Keep postgres:// as-is for SYNC_DATABASE_URL
#      In Supabase SQL editor run: CREATE EXTENSION IF NOT EXISTS timescaledb;
#   2. Create an Upstash Redis database → copy the Redis URL
#   3. Push this repo to GitHub
#   4. Go to dashboard.render.com → New → Blueprint → connect repo
#   5. Set the env vars below marked sync: false in the Render dashboard
#
# NOTE: Render free tier sleeps after 15 min of inactivity.
#       First request after sleep takes ~30s. Acceptable for demos.

services:
  # ── FastAPI API + React SPA ────────────────────────────────────────────────
  # Serves both the API (/api/*) and the React frontend (/)
  - type: web
    name: sepsis-watch-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # Supabase DB — set these in Render dashboard after creating Supabase project
      - key: DATABASE_URL
        sync: false   # postgresql+asyncpg://postgres:[password]@db.[ref].supabase.co:5432/postgres
      - key: SYNC_DATABASE_URL
        sync: false   # postgresql://postgres:[password]@db.[ref].supabase.co:5432/postgres
      # Upstash Redis — set in Render dashboard after creating Upstash DB
      - key: REDIS_URL
        sync: false   # rediss://default:[password]@[host].upstash.io:6379
      - key: SECRET_KEY
        sync: false   # generate with: python -c "import secrets; print(secrets.token_hex(32))"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: GROQ_API_KEY
        sync: false   # free at console.groq.com
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ANTHROPIC_API_KEY
        sync: false   # optional
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: '*'
      # Self-ping every 10 min to prevent free-tier sleep during demos
      # Set this to your Render URL after first deploy e.g. https://sepsis-watch-api.onrender.com
      - key: PUBLIC_URL
        sync: false

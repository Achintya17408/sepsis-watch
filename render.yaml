# Render deployment config — render.yaml
# https://render.com/docs/blueprint-spec
#
# How to deploy:
#   1. Push repo to GitHub
#   2. Go to dashboard.render.com → New → Blueprint
#   3. Connect the repo — Render reads this file automatically
#   4. Set secret env vars in the Render dashboard (DB_PASSWORD, SECRET_KEY, etc.)
#
# NOTE: Render's managed Postgres doesn't include TimescaleDB. Use the "Docker"
# database type below which runs the official timescale image, OR sign up for a
# free Timescale Cloud trial at https://console.cloud.timescale.com/

services:
  # ── FastAPI API ────────────────────────────────────────────────────────────
  - type: web
    name: sepsis-watch-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://sepsis_user:${DB_PASSWORD}@${DB_HOST}:5432/sepsis_watch
      - key: SYNC_DATABASE_URL
        value: postgresql://sepsis_user:${DB_PASSWORD}@${DB_HOST}:5432/sepsis_watch
      - key: REDIS_URL
        fromService:
          name: sepsis-watch-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false   # set manually in Render dashboard
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: GROQ_API_KEY
        sync: false   # get free key at console.groq.com
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ANTHROPIC_API_KEY
        sync: false   # optional — fallback if Groq not set
      - key: APP_ENV
        value: production

  # ── Celery worker ──────────────────────────────────────────────────────────
  - type: worker
    name: sepsis-watch-celery-worker
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.worker worker --loglevel=info --concurrency=2
    plan: starter
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://sepsis_user:${DB_PASSWORD}@${DB_HOST}:5432/sepsis_watch
      - key: SYNC_DATABASE_URL
        value: postgresql://sepsis_user:${DB_PASSWORD}@${DB_HOST}:5432/sepsis_watch
      - key: REDIS_URL
        fromService:
          name: sepsis-watch-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: APP_ENV
        value: production

  # ── Celery beat ────────────────────────────────────────────────────────────
  - type: worker
    name: sepsis-watch-celery-beat
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.worker beat --loglevel=info
    plan: starter
    envVars:
      - key: REDIS_URL
        fromService:
          name: sepsis-watch-redis
          type: redis
          property: connectionString
      - key: APP_ENV
        value: production

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: sepsis-watch-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
